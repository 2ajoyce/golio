name: CI
on: [push, pull_request]
jobs:
  tidy:
    name: Tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go mod tidy
      - name: Check for go.mod / go.sum drift
        run: |
          if [ -n "$(git diff --name-only go.mod go.sum)" ]; then
            echo "go.mod or go.sum is not tidy. Run 'go mod tidy' and commit the result."
            git diff go.mod go.sum
            exit 1
          fi
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go mod download
      - run: go build .
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go mod download
      - run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...
      - name: Update coverage badge
        if: github.ref == 'refs/heads/master'
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          COVERAGE=$(go tool cover -func=coverage.txt | grep '^total:' | awk '{print $3}')
          COLOR=$(echo $COVERAGE | awk -F'%' '{
            v=$1+0
            if (v>=90) print "brightgreen"
            else if (v>=75) print "green"
            else if (v>=60) print "yellow"
            else print "red"
          }')
          curl -sX PATCH https://api.github.com/gists/4360706d1f85e1d95b6fc28ad12141b1 \
            -H "Authorization: token $GIST_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"files\":{\"coverage.json\":{\"content\":\"{\\\"schemaVersion\\\":1,\\\"label\\\":\\\"coverage\\\",\\\"message\\\":\\\"$COVERAGE\\\",\\\"color\\\":\\\"$COLOR\\\"}\"}}}" \
            --fail
